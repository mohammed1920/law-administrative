name: Auto Update Index
on:
  push:
    branches:
      - main
      - رئيسي
    paths:
      - 'ch*.html'
      - 'update_index.py'  # صار يشتغل حتى لو غيرت التصميم بالسكربت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Update Script
        run: python update_index.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "تحديث التصميم والفهرس أوتوماتيكياً" || exit 0
          git push
