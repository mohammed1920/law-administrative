<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فهرس فصول الكتاب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: "Cairo", sans-serif; background: #080808; color: #f8fafc; padding: 20px; margin: 0; min-height: 100vh; }
  .header { text-align: center; padding: 30px 0; }
  h1 { color: #d4af37; font-size: 1.8rem; margin-bottom: 5px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
  .book-name { color: #a67c00; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }
  .container { max-width: 650px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 60px; }
  .chapter-card { 
      background: rgba(20, 20, 20, 0.8); 
      border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 14px; 
      padding: 16px 20px; text-decoration: none; transition: all 0.3s ease; 
      display: flex; align-items: center; gap: 15px; 
  }
  .chapter-card:hover { 
      transform: scale(1.02); border-color: #d4af37; 
      background: rgba(212, 175, 55, 0.05); 
  }
  .chapter-title { color: #f8fafc; font-size: 1.05rem; font-weight: bold; flex-grow: 1; }
  .chapter-icon { background: #d4af37; color: #080808; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.85rem; font-weight: 700; order: -1; }
  .telegram-btn { 
      display: flex; align-items: center; justify-content: center; gap: 10px; 
      background: linear-gradient(135deg, #a67c00, #d4af37); color: #080808; 
      padding: 16px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; 
      margin-top: 35px; align-self: center; 
  }
  .footer { text-align: center; margin-top: 40px; font-size: 0.7rem; color: #444; }
</style>
</head>
<body>

<div class="header">
  <h1>فهرس فصول الكتاب</h1>
  <div class="book-name">القانون الإداري</div>
</div>

<div class="container" id="chapters-container">
  <a href="ch01.html" class="chapter-card"><span class="chapter-icon">1</span><span class="chapter-title">جاري التحميل...</span></a>
  <a href="ch02.html" class="chapter-card"><span class="chapter-icon">2</span><span class="chapter-title">جاري التحميل...</span></a>
  <a href="ch03.html" class="chapter-card"><span class="chapter-icon">3</span><span class="chapter-title">جاري التحميل...</span></a>
  <a href="ch04.html" class="chapter-card"><span class="chapter-icon">4</span><span class="chapter-title">جاري التحميل...</span></a>
  <a href="ch05.html" class="chapter-card"><span class="chapter-icon">5</span><span class="chapter-title">جاري التحميل...</span></a>
  <a href="ch1.html" class="chapter-card"><span class="chapter-icon">6</span><span class="chapter-title">جاري التحميل...</span></a>

  <a href="https://t.me/M5M5P" class="telegram-btn">انضم لقناة التليجرام ✈️</a>
  <div class="footer">تم التحديث بواسطة فاعل خير</div>
</div>

<script>
  // وظيفة لجلب العناوين من ملفات الفصول تلقائياً
  async function fetchChapterTitles() {
    const links = document.querySelectorAll('.chapter-card');
    
    links.forEach(async (link) => {
      const url = link.getAttribute('href');
      if (url && url.startsWith('ch')) { // يقرأ فقط الملفات اللي تبدأ بـ ch
        try {
          const response = await fetch(url);
          const text = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'text/html');
          const title = doc.querySelector('title').innerText;
          
          // تحديث نص الفصل فقط، ولا يلمس اسم الكتاب الفوق
          if (title) {
            link.querySelector('.chapter-title').innerText = title;
          }
        } catch (error) {
          console.error("خطأ في جلب عنوان الملف:", url);
        }
      }
    });
  }

  // تشغيل الوظيفة عند فتح الصفحة
  window.onload = fetchChapterTitles;
</script>

</body>
</html>
