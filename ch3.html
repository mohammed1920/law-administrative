<head>

    <style>

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --gold: #c29d5f; --gold-dim: #9a7a47;
            --green: #10b981; --red: #ef4444;

        }
        body {
            background: var(--bg);
            font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 24px 16px 48px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 25px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(194,157,95,.08);
            width: 100%; max-width: 780px;
            padding: 36px 36px 28px;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top:0;left:0;right:0; height:4px;
            background: linear-gradient(90deg,var(--gold),#e8c97a,var(--gold));
        }
        h1 { color:var(--gold); font-size:1.55rem; font-weight:900; text-align:center; margin-bottom:6px; }
        .subtitle { text-align:center; font-size:.85rem; color:var(--muted); margin-bottom:22px; }
        .progress-wrap { background:#0f172a; border-radius:999px; height:7px; margin-bottom:8px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:999px; transition:width .4s ease; }
        #status { text-align:center; font-size:.82rem; color:var(--muted); margin-bottom:22px; }
        .score-row { display:flex; justify-content:center; gap:16px; margin-bottom:22px; flex-wrap:wrap; }
        .chip { display:flex; align-items:center; gap:6px; background:#0f172a; border:1px solid var(--border); border-radius:999px; padding:5px 14px; font-size:.82rem; }
        .chip-dot { width:10px; height:10px; border-radius:50%; }
        .chip-dot.g { background:var(--green); } .chip-dot.r { background:var(--red); }
        .q-num { display:inline-block; background:var(--gold); color:#0f172a; font-weight:900; font-size:.78rem; padding:3px 10px; border-radius:6px; margin-bottom:10px; }
        .q-text { font-size:1.08rem; font-weight:700; line-height:1.75; color:var(--text); margin-bottom:22px; background:rgba(255,255,255,.03); border-right:3px solid var(--gold); padding:12px 16px; border-radius:0 8px 8px 0; }
        #options { display:flex; flex-direction:column; gap:11px; margin-bottom:22px; }
        .opt-btn { background:#0f172a; border:1.5px solid var(--border); border-radius:10px; color:var(--text); cursor:pointer; font-family:inherit; font-size:.97rem; font-weight:600; padding:13px 18px; text-align:right; transition:all .22s ease; display:flex; align-items:center; gap:10px; }

        .opt-btn .opt-label { background:var(--border); color:var(--gold); border-radius:6px; font-size:.78rem; font-weight:900; padding:2px 8px; flex-shrink:0; }
        .opt-btn.correct { background:rgba(16,185,129,.12); border-color:var(--green); color:var(--green); }
        .opt-btn.correct .opt-label { background:var(--green); color:#fff; }
        .opt-btn.wrong { background:rgba(239,68,68,.1); border-color:var(--red); color:var(--red); }
        .opt-btn.wrong .opt-label { background:var(--red); color:#fff; }
        .opt-btn:disabled { cursor:default; transform:none; }
        #feedback { min-height:28px; font-size:.9rem; font-weight:700; text-align:center; margin-bottom:16px; border-radius:8px; padding:8px 12px; display:none; }
        #feedback.show { display:block; }
        #feedback.ok  { background:rgba(16,185,129,.12); color:var(--green); }
        #feedback.err { background:rgba(239,68,68,.1); color:var(--red); }
        #next-btn { width:100%; background:linear-gradient(135deg,var(--gold-dim),var(--gold)); border:none; border-radius:10px; color:#0f172a; cursor:pointer; font-family:inherit; font-size:1rem; font-weight:900; padding:14px; transition:opacity .2s,transform .2s; margin-bottom:20px; display:none; }
        #next-btn:hover { opacity:.88; transform:translateY(-1px); }
        .footer-nav { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; border-top:1px solid var(--border); padding-top:18px; }

        #result-screen { display:none; text-align:center; padding:20px 0; }

        .result-title { font-size:1.6rem; font-weight:900; color:var(--gold); margin-bottom:8px; }
        .result-score { font-size:3.5rem; font-weight:900; background:linear-gradient(135deg,var(--gold-dim),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
        .result-msg { color:var(--muted); font-size:1rem; margin-bottom:24px; }
        .result-bars { display:flex; justify-content:center; gap:24px; margin-bottom:28px; flex-wrap:wrap; }
        .rbar { background:#0f172a; border:1px solid var(--border); border-radius:12px; padding:14px 22px; }
        .rbar-val { font-size:1.5rem; font-weight:900; }
        .rbar-val.g { color:var(--green); } .rbar-val.r { color:var(--red); }
        .rbar-lbl { font-size:.8rem; color:var(--muted); }
        .restart-btn { background:linear-gradient(135deg,var(--gold-dim),var(--gold)); border:none; border-radius:10px; color:#0f172a; cursor:pointer; font-family:inherit; font-size:1rem; font-weight:900; padding:13px 32px; transition:opacity .2s; }

    </style>
</head>

let questions=[], current=0, correct=0, wrong=0, answered=false;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }return arr;
}

function restartQuiz(){
  current=0;correct=0;wrong=0;answered=false;
  questions=shuffle([...allQuestions]);
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=questions[current], total=questions.length;
  document.getElementById('progress-fill').style.width=((current/total)*100)+'%';
  document.getElementById('status').textContent=`سؤال ${current+1} من ${total}`;
  document.getElementById('q-num').textContent=`س${current+1}`;
  document.getElementById('question').textContent=q.q;
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
  const fb=document.getElementById('feedback');
  fb.className='';fb.textContent='';
  document.getElementById('next-btn').style.display='none';
  const labels=['أ','ب','ج','د'];
  const indices=[0,1,2,3]; shuffle(indices);
  const container=document.getElementById('options');
  container.innerHTML='';
  indices.forEach((origIdx,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span>${q.opts[origIdx]}`;
    btn.dataset.orig=origIdx;
    btn.addEventListener('click',()=>handleAnswer(btn,origIdx,q.ans));
    container.appendChild(btn);
  });
}

function handleAnswer(clickedBtn,chosen,correct_orig){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.dataset.orig)===correct_orig) b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  if(chosen===correct_orig){
    correct++;
    clickedBtn.classList.add('correct');
    fb.textContent='✅ إجابة صحيحة!';
    fb.className='show ok';
  } else {
    wrong++;
    clickedBtn.classList.add('wrong');
    fb.textContent='❌ إجابة خاطئة! الجواب الصحيح محدد باللون الأخضر.';
    fb.className='show err';
  }
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
  document.getElementById('next-btn').style.display='block';
}

document.getElementById('next-btn').addEventListener('click',()=>{
  current++;
  if(current>=questions.length) showResult();
  else showQuestion();
});

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=questions.length, pct=Math.round((correct/total)*100);
  document.getElementById('result-score').textContent=`${correct} / ${total}`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-wrong').textContent=wrong;
  document.getElementById('r-pct').textContent=pct+'%';
  let msg='',trophy='🏆';
  if(pct>=90){msg='ممتاز! أداء رائع ومتميز 🌟';trophy='🥇';}
  else if(pct>=75){msg='جيد جداً! مستوى متقدم 👏';trophy='🥈';}
  else if(pct>=60){msg='جيد، راجع الفصل لتعزيز المعلومات 📖';trophy='🥉';}
  else{msg='يُنصح بمراجعة الفصل الثالث مجدداً وإعادة الاختبار 📚';trophy='📚';}
  document.getElementById('trophy').textContent=trophy;
  document.getElementById('result-msg').textContent=msg;
}

restartQuiz();
</script>
</body>
</html>
