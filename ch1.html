<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الفصل الأول – أصل الدولة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(194,157,95,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.05) 0%, transparent 50%);
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(194,157,95,0.15);
            padding: 36px 40px 28px;
            max-width: 780px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c29d5f, #f0c070, #c29d5f);
        }

        /* Header */
        .quiz-header { text-align: center; margin-bottom: 28px; }

        h1#chapter-title {
            color: #c29d5f;
            font-size: 1.55rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(194,157,95,0.3);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Progress */
        #status {
            text-align: center;
            color: #c29d5f;
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .progress-bar-wrap {
            background: #0f172a;
            border-radius: 99px;
            height: 6px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #c29d5f, #f0c070);
            border-radius: 99px;
            transition: width 0.5s cubic-bezier(.4,0,.2,1);
        }

        /* Score display */
        .score-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(194,157,95,0.12);
            border: 1px solid rgba(194,157,95,0.3);
            border-radius: 10px;
            padding: 5px 12px;
            color: #c29d5f;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Question */
        .q-text {
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(194,157,95,0.2);
            border-radius: 14px;
            padding: 20px 22px;
            color: #e2e8f0;
            font-size: 1.08rem;
            font-weight: 600;
            line-height: 1.75;
            margin-bottom: 22px;
            min-height: 70px;
        }

        .q-number {
            display: inline-block;
            background: linear-gradient(135deg, #c29d5f, #f0c070);
            color: #0f172a;
            border-radius: 8px;
            padding: 2px 10px;
            font-size: 0.78rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        /* Options */
        #options { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }

        .option-btn {
            background: rgba(30,41,59,0.8);
            border: 1.5px solid rgba(100,116,139,0.35);
            border-radius: 12px;
            padding: 14px 18px;
            color: #cbd5e1;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            font-size: 0.97rem;
            font-weight: 600;
            text-align: right;
            cursor: pointer;
            transition: all 0.22s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(194,157,95,0.08), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #c29d5f;
            color: #f1e3c5;
            transform: translateX(-3px);
            box-shadow: 0 4px 18px rgba(194,157,95,0.15);
        }

        .option-btn:hover:not(:disabled)::before { opacity: 1; }

        .option-btn.correct {
            background: rgba(16,185,129,0.15);
            border-color: #10b981;
            color: #6ee7b7;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.25), 0 4px 18px rgba(16,185,129,0.15);
        }

        .option-btn.wrong {
            background: rgba(239,68,68,0.12);
            border-color: #ef4444;
            color: #fca5a5;
            box-shadow: 0 0 0 2px rgba(239,68,68,0.2);
        }

        .option-btn:disabled { cursor: default; transform: none !important; }

        /* Option label badge */
        .option-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: rgba(194,157,95,0.15);
            border-radius: 7px;
            font-size: 0.8rem;
            font-weight: 900;
            margin-left: 10px;
            color: #c29d5f;
            flex-shrink: 0;
            float: left;
            transition: all 0.22s;
        }

        .option-btn.correct .option-label { background: rgba(16,185,129,0.3); color: #6ee7b7; }
        .option-btn.wrong .option-label { background: rgba(239,68,68,0.25); color: #fca5a5; }

        /* Feedback */
        #feedback {
            display: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.93rem;
            font-weight: 700;
            margin-bottom: 18px;
            text-align: center;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #feedback.correct-fb {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            color: #34d399;
        }

        #feedback.wrong-fb {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.35);
            color: #f87171;
        }

        /* Next button */
        #next-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #c29d5f, #d4a96a);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #0f172a;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.22s;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(194,157,95,0.3);
        }

        #next-btn:hover {
            background: linear-gradient(135deg, #d4a96a, #e8be80);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(194,157,95,0.4);
        }

        /* Footer navigation */
        .footer-nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .footer-nav a {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            transition: all 0.22s;
        }

        .btn-home {
            background: rgba(100,116,139,0.15);
            border: 1.5px solid rgba(100,116,139,0.35);
            color: #94a3b8;
        }

        .btn-home:hover {
            background: rgba(100,116,139,0.25);
            color: #cbd5e1;
            border-color: #64748b;
            transform: translateY(-2px);
        }

        .btn-telegram {
            background: rgba(0,136,204,0.12);
            border: 1.5px solid rgba(0,136,204,0.35);
            color: #38bdf8;
        }

        .btn-telegram:hover {
            background: rgba(0,136,204,0.22);
            color: #7dd3fc;
            border-color: #0088cc;
            transform: translateY(-2px);
        }

        /* Result Screen */
        #result-screen {
            display: none;
            text-align: center;
            animation: fadeSlide 0.5s ease;
        }

        .result-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(#c29d5f var(--pct), #1e293b 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 0 40px rgba(194,157,95,0.3);
        }

        .result-circle-inner {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-pct { color: #c29d5f; font-size: 1.9rem; font-weight: 900; line-height: 1; }
        .result-label { color: #94a3b8; font-size: 0.75rem; font-weight: 700; }

        .result-title { color: #e2e8f0; font-size: 1.4rem; font-weight: 900; margin-bottom: 8px; }
        .result-sub { color: #94a3b8; font-size: 0.92rem; margin-bottom: 28px; }
        .result-grade {
            display: inline-block;
            padding: 8px 24px;
            border-radius: 99px;
            font-size: 1rem;
            font-weight: 900;
            margin-bottom: 28px;
        }
        .grade-excellent { background: rgba(16,185,129,0.15); border: 1px solid #10b981; color: #34d399; }
        .grade-good      { background: rgba(194,157,95,0.15); border: 1px solid #c29d5f; color: #f0c070; }
        .grade-pass      { background: rgba(59,130,246,0.15); border: 1px solid #3b82f6; color: #93c5fd; }
        .grade-fail      { background: rgba(239,68,68,0.12); border: 1px solid #ef4444; color: #f87171; }

        .btn-restart {
            background: linear-gradient(135deg, #c29d5f, #d4a96a);
            border: none;
            border-radius: 12px;
            padding: 13px 36px;
            color: #0f172a;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.22s;
            box-shadow: 0 4px 20px rgba(194,157,95,0.3);
            margin-bottom: 20px;
            display: block;
            width: 100%;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(194,157,95,0.4);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(194,157,95,0.25), transparent);
            margin: 20px 0;
        }

        @media (max-width: 520px) {
            .card { padding: 24px 18px 20px; }
            h1#chapter-title { font-size: 1.2rem; }
            .q-text { font-size: 0.97rem; }
            .option-btn { font-size: 0.9rem; padding: 12px 14px; }
        }
    </style>
</head>
<body>

<div class="card" id="quiz-box">

    <div class="score-badge" id="score-badge">✅ 0 صح</div>

    <div class="quiz-header">
        <h1 id="chapter-title">الفصل الأول – أصل الدولة</h1>

    <div id="status">سؤال 1 من 65</div>

    <div id="options"></div>

    <div id="feedback"></div>

    <button id="next-btn" onclick="nextQuestion()">التالي ←</button>

    <div class="footer-nav">
        <a href="index.html" class="btn-home">🏠 الرجوع للقائمة الرئيسية</a>
        <a href="https://t.me/M5M5P" target="_blank" class="btn-telegram">📢 قناة التليجرام</a>

    <div id="result-screen">
        <div class="result-circle" id="result-circle">

                <div class="result-label">النتيجة</div>

        <div class="footer-nav" style="justify-content:center">

        </div>
    </div>

</div>

// Shuffle options for each question while tracking correct answer
function shuffleQuestions(arr) {
    return arr.map(q => {
        const correctText = q.opts[q.ans];
        const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
        return {
            q: q.q,
            opts: shuffled,
            ans: shuffled.indexOf(correctText)
        };
    }).sort(() => Math.random() - 0.5);
}

    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;
}

function selectAnswer(idx) {
    if (answered) return;
    answered = true;

    const q = quizData[current];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    const fb = document.getElementById('feedback');

    if (idx === q.ans) {
        btns[idx].classList.add('correct');
        score++;
        fb.className = 'correct-fb';
        fb.textContent = '✅ إجابة صحيحة!';
        document.getElementById('score-badge').textContent = `✅ ${score} صح`;
    } else {
        btns[idx].classList.add('wrong');
        btns[q.ans].classList.add('correct');
        fb.className = 'wrong-fb';
        fb.textContent = `❌ خطأ! الإجابة الصحيحة: ${q.opts[q.ans]}`;
    }

    fb.style.display = 'block';

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = current + 1 < quizData.length ? 'التالي ←' : '🏆 إنهاء الاختبار';
}

function nextQuestion() {
    current++;
    if (current < quizData.length) {
        displayQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('q-number') && null;
    document.getElementById('question').style.display = 'none';
    document.getElementById('options').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.querySelector('.progress-bar-wrap').style.display = 'none';
    document.querySelector('.score-badge').style.display = 'none';

    const total = quizData.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById('result-pct').textContent = pct + '%';
    document.getElementById('result-sub').textContent = `أجبت على ${score} سؤالاً صحيحاً من ${total}`;
    document.getElementById('result-circle').style.setProperty('--pct', `${pct}%`);

    const gradeEl = document.getElementById('result-grade');
    if (pct >= 90) {
        gradeEl.textContent = '🏆 ممتاز';
        gradeEl.className = 'result-grade grade-excellent';
    } else if (pct >= 75) {
        gradeEl.textContent = '⭐ جيد جداً';
        gradeEl.className = 'result-grade grade-good';
    } else if (pct >= 60) {
        gradeEl.textContent = '✅ جيد';
        gradeEl.className = 'result-grade grade-pass';
    } else {
        gradeEl.textContent = '📚 تحتاج مراجعة';
        gradeEl.className = 'result-grade grade-fail';
    }

    document.getElementById('result-screen').style.display = 'block';
}

function restartQuiz() {
    quizData = shuffleQuestions(questions);
    current = 0;
    score = 0;
    answered = false;

    document.getElementById('question').style.display = 'block';
    document.getElementById('options').style.display = 'flex';
    document.getElementById('status').style.display = 'block';
    document.querySelector('.progress-bar-wrap').style.display = 'block';
    document.querySelector('.score-badge').style.display = 'block';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('score-badge').textContent = '✅ 0 صح';

    displayQuestion();
}

// Init
displayQuestion();
</script>

</body>
</html>
