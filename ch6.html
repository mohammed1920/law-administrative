/* ── State ── */
let questions=[],current=0,correct=0,wrong=0,answered=false;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }return arr;
}

function restartQuiz(){
  current=0;correct=0;wrong=0;answered=false;
  questions=shuffle([...allQuestions]);
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=questions[current],total=questions.length;
  document.getElementById('progress-fill').style.width=((current/total)*100)+'%';
  document.getElementById('status').textContent=`سؤال ${current+1} من ${total}`;
  document.getElementById('q-num').textContent=`س${current+1}`;
  document.getElementById('question').textContent=q.q;
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
  const fb=document.getElementById('feedback');fb.className='';fb.textContent='';
  document.getElementById('next-btn').style.display='none';
  const labels=['أ','ب','ج','د'],indices=[0,1,2,3];shuffle(indices);
  const container=document.getElementById('options');container.innerHTML='';
  indices.forEach((origIdx,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span>${q.opts[origIdx]}`;
    btn.dataset.orig=origIdx;
    btn.addEventListener('click',()=>handleAnswer(btn,origIdx,q.ans));
    container.appendChild(btn);
  });
}

function handleAnswer(clickedBtn,chosen,correct_orig){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.dataset.orig)===correct_orig)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  if(chosen===correct_orig){correct++;clickedBtn.classList.add('correct');fb.textContent='✅ إجابة صحيحة!';fb.className='show ok';}
  else{wrong++;clickedBtn.classList.add('wrong');fb.textContent='❌ إجابة خاطئة! الجواب الصحيح محدد باللون الأخضر.';fb.className='show err';}
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
  document.getElementById('next-btn').style.display='block';
}

document.getElementById('next-btn').addEventListener('click',()=>{
  current++;
  if(current>=questions.length)showResult();else showQuestion();
});

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=questions.length,pct=Math.round((correct/total)*100);
  document.getElementById('result-score').textContent=`${correct} / ${total}`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-wrong').textContent=wrong;
  document.getElementById('r-pct').textContent=pct+'%';
  let msg='',trophy='🏆';
  if(pct>=90){msg='ممتاز! أداء رائع ومتميز 🌟';trophy='🥇';}
  else if(pct>=75){msg='جيد جداً! مستوى متقدم 👏';trophy='🥈';}
  else if(pct>=60){msg='جيد، راجع الفصل لتعزيز المعلومات 📖';trophy='🥉';}
  else{msg='يُنصح بمراجعة الفصل مجدداً وإعادة الاختبار 📚';trophy='📚';}
  document.getElementById('trophy').textContent=trophy;
  document.getElementById('result-msg').textContent=msg;
}

restartQuiz();
</script>
